# plugins/intelligence/news/config.yaml
#
# Same watchlist convention as plugins/scanners/core/ -- a real deployment
# would point this at whatever symbols the user actually watches. A short
# interval keeps local/dev usage lively; see IntelligencePlugin's docstring
