# ============================================================
# AI Trading Assistant — default configuration
# Environment variables (see .env.example) always override
# values here. Never put secrets in this file.
# ============================================================

app:
  name: "AI Trading Assistant"
  env: development
  timezone: "America/New_York"

logging:
  level: INFO
  json: false
  log_dir: "logs"
  max_bytes: 10485760 # 10 MB
  backup_count: 5

event_bus:
  # max events buffered per subscriber queue before backpressure
  queue_max_size: 1000
  # how long a handler may run before it's logged as slow (seconds)
  slow_handler_threshold: 2.0

plugins:
  # directories scanned for plugins, relative to project root
  search_paths:
    - "plugins/indicators"
    - "plugins/strategies"
    - "plugins/scanners"
    - "plugins/news"
    - "plugins/earnings"
    - "plugins/macro"
    - "plugins/ai"
    - "plugins/broker"
    - "plugins/journals"
    - "plugins/alerts"
    - "plugins/dashboards"
    - "plugins/education"
    - "plugins/commands"
    - "plugins/integrations"
    - "plugins/risk"
  # plugins listed here are skipped even if discovered
  disabled: []

reasoning:
  enabled: true
  provider: anthropic
  model: "claude-opus-4-8"
  max_tokens: 1500
  temperature: 0.3
  min_evidence_count: 1

database:
  pool_size: 5
  max_overflow: 10
  echo: false

scanner:
  interval_seconds: 60
  timeframes: ["1m", "5m", "15m", "1h", "1d"]
  asset_classes: ["stocks", "crypto"]

api:
  host: "0.0.0.0"
  port: 8000

discord:
  command_prefix: "/"

aggregation:
  # how long (seconds) a piece of evidence stays "fresh" / active before it
  # decays out of the Strategy Engine's and Reasoning Engine's view
  freshness_window_seconds: 900
  # bounded per-symbol history the aggregator retains (full sequence, not
  # just the fresh subset)
  max_history_per_symbol: 500
