# ============================================================
# AI Trading Assistant — default configuration
# Environment variables (see .env.example) always override
# values here. Never put secrets in this file.
# ============================================================

app:
  name: "AI Trading Assistant"
  env: development
  timezone: "America/New_York"

logging:
  level: INFO
  json: false
  log_dir: "logs"
  max_bytes: 10485760 # 10 MB
  backup_count: 5

event_bus:
  # max events buffered per subscriber queue before backpressure
  queue_max_size: 1000
  # how long a handler may run before it's logged as slow (seconds)
  slow_handler_threshold: 2.0

plugins:
  # directories scanned for plugins, relative to project root
  search_paths:
    - "plugins/indicators"
    - "plugins/strategies"
    - "plugins/scanners"
    # One unified External Intelligence Platform folder (Milestone 7) --
    # News, Earnings, Macro, and any future source (SEC filings, insider
    # activity, economic calendar, ...) are all plugins under here, not
    # separate isolated search paths. See app/intelligence/plugin.py.
    - "plugins/intelligence"
    - "plugins/ai"
    - "plugins/broker"
    - "plugins/journals"
    - "plugins/alerts"
    - "plugins/dashboards"
    - "plugins/education"
    - "plugins/commands"
    - "plugins/integrations"
    - "plugins/risk"
    - "plugins/market_data"
  # plugins listed here are skipped even if discovered
  disabled: []

reasoning:
  enabled: true
  provider: anthropic
  model: "claude-opus-4-8"
  max_tokens: 1500
  temperature: 0.3
  min_evidence_count: 1

database:
  pool_size: 5
  max_overflow: 10
  echo: false

scanner:
  interval_seconds: 60
  timeframes: ["1m", "5m", "15m", "1h", "1d"]
  asset_classes: ["stocks", "crypto"]

api:
  host: "0.0.0.0"
  port: 8000

discord:
  command_prefix: "/"
  # Channel ID the bot proactively posts AlertGenerated events to. Leave
  # null to keep alerts decision-only (evaluated + logged, never posted) --
  # useful during development, or before you've picked an alerts channel.
  alert_channel_id: null

aggregation:
  # how long (seconds) a piece of evidence stays "fresh" / active before it
  # decays out of the Strategy Engine's and Reasoning Engine's view
  freshness_window_seconds: 900
  # bounded per-symbol history the aggregator retains (full sequence, not
  # just the fresh subset)
  max_history_per_symbol: 500

market_data:
  # Provider names to try, in priority order -- see app/marketdata/service.py.
  # A symbol/timeframe the first provider doesn't have falls over to the
  # next one instead of failing the whole fetch.
  providers: ["replay"]

intelligence:
  # Default poll interval for every External Intelligence Platform plugin
  # that doesn't set its own interval_seconds in its config.yaml.
  interval_seconds: 60

context:
  # Thresholds the Market Context Engine (app/context/engine.py) uses to
  # derive Bull/Bear/Sideways trend, High/Low Volatility, Gap Day, Trend
  # Exhaustion, Low Liquidity, and market-wide Risk-On/Risk-Off from raw
  # price/volume history -- tune per asset class without touching code.
  trend_window: 20
  trend_bull_threshold_pct: 1.5
  trend_bear_threshold_pct: -1.5
  volatility_window: 20
  high_volatility_threshold_pct: 2.0
  low_volatility_threshold_pct: 0.3
  gap_threshold_pct: 2.0
  low_liquidity_volume_ratio: 0.4
  risk_regime_min_symbols: 2
  risk_regime_majority_ratio: 0.6

confidence_weighting:
  # Per-source reliability multiplier used by the Confidence Weighting
  # Framework (app/aggregation/weighting.py). Any source not listed here
  # falls back to DEFAULT_SOURCE_RELIABILITY (0.75). This also doubles as
  # a stand-in for "historical reliability" until a real trade-outcome
  # history exists to derive it empirically instead of by config.
  source_reliability:
    EMA: 0.75
    SMA: 0.7
    VWAP: 0.75
    RSI: 0.75
    MACD: 0.75
    ATR: 0.65
    ADX: 0.7
    Bollinger: 0.7
    Supertrend: 0.75
    OBV: 0.65
    CCI: 0.65
    Ichimoku: 0.7
    Donchian: 0.7
    VolumeProfile: 0.65
    News: 0.55
    Earnings: 0.8
    Macro: 0.85
  max_cross_confirmation_boost: 0.5
  max_timeframe_alignment_boost: 0.2
  contradiction_penalty: 0.5
  regime_aligned_boost: 1.2
  regime_opposed_penalty: 0.85

portfolio:
  # The configured set of symbols the Portfolio Intelligence Layer
  # continuously monitors/profiles (app/portfolio/). A symbol outside this
  # list is never tracked -- "watch a new symbol" is a config change here,
  # not a code change. Matches the reference scanner's default watchlist
  # so /watchlist has real data out of the box.
  watchlist: ["NVDA", "AAPL", "TSLA"]
  confidence_trend_window: 8
  confidence_trend_margin: 0.05
  notable_context_types: ["trend", "volatility", "gap", "exhaustion", "risk_regime", "macro_event"]
  fundamental_freshness_seconds: 600
  alert_suppression_seconds: 300
  alert_suppression_factor: 0.5

prioritization:
  # A candidate (fresh evidence, a strategy match, a context shift) must
  # score at least this high (0-100) to become a real Discord alert.
  alert_threshold: 60.0
  # Minimum time between two alerts sharing the same (symbol, alert_key) --
  # the duplicate-suppression window that keeps the same development from
  # re-alerting every time its underlying evidence re-fires.
  alert_cooldown_seconds: 300
  # Only watchlist symbols (portfolio.watchlist) are eligible for alerts.
  watchlist_only: true
  decision_log_size: 20
