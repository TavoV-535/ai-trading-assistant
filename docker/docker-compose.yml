services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: trading_assistant
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading_assistant"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      # overrides .env so the app always reaches the compose network's
      # postgres service by name, regardless of what's in .env for
      # non-docker (bare-metal) runs
      DATABASE_URL: postgresql+asyncpg://trading:trading@postgres:5432/trading_assistant
    ports:
      - "8000:8000"
    volumes:
      - ../logs:/app/logs
      - ../plugins:/app/plugins:ro
      - ../config:/app/config:ro
    stop_grace_period: 15s

volumes:
  pgdata:
